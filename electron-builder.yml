appId: com.rachel.tasktodo
productName: Task To Do
copyright: "Copyright 2026"

directories:
  output: dist
  buildResources: resources

files:
  - out/**/*

publish:
  provider: github
  owner: 2RoR2
  repo: tasktodo

# Windows
win:
  icon: resources/icon.png
  target:
    - target: nsis
      arch:
        - x64
  artifactName: Task-To-Do-${version}.${ext}

nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true
  createStartMenuShortcut: true
  shortcutName: "Task To Do"
  artifactName: Task-To-Do-Setup-${version}.${ext}

# macOS
mac:
  icon: resources/icon.png
  category: public.app-category.productivity
  target:
    - target: dmg
      arch:
        - x64
        - arm64

dmg:
  window:
    width: 540
    height: 380
  
